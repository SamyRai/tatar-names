version: "0.1.0"
do_not_merge:
  - left: "Ильмир"
    right: "Эльмир"
    reason: "Different initial vowel; both valid canonical names"
    severity: hard
  - left: "Олеся"
    right: "Алеся"
    reason: "Different canonical names despite edit distance 1"
    severity: hard
  - left: "Илнар"
    right: "Эльнар"
    reason: "Similar structure but distinct independent names"
    severity: hard
  - left: "Алия"
    right: "Галия"
    reason: "Different canonical names with dangerous fuzzy overlap"
    severity: hard
  - left: "Рамиль"
    right: "Рамил"
    reason: "Soft-sign variation is not proof of the same identity"
    severity: hard
  - left: "Дамир"
    right: "Димир"
    reason: "Single-vowel change remains merge-unsafe"
    severity: hard
